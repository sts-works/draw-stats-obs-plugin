name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package release ZIP
        run: bash scripts/package-release.sh "${GITHUB_REF_NAME#v}"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/draw-stats-obs-plugin.zip
