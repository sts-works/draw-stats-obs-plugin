<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Draw Stats Overlay</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-variant-numeric: tabular-nums;
      --surface: rgba(20, 20, 23, .88);
      --surface-strong: rgba(25, 25, 29, .94);
      --line: rgba(255, 255, 255, .13);
      --muted: #a8a8b0;
      --white: #f8f8f9;
      --orange: #ff8a1f;
      --orange-light: #ffb054;
      --blue: #41b9ff;
      --yellow: #ffc52a;
      --magenta: #d76dff;
      --green: #59d88b;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    body { color: var(--white); }
    .overlay {
      position: absolute;
      left: clamp(20px, 2.2vw, 34px);
      right: clamp(20px, 2.2vw, 34px);
      bottom: clamp(20px, 2.2vw, 34px);
      display: grid;
      gap: 10px;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, .35));
    }
    .topline { display: flex; align-items: stretch; gap: 10px; }
    .recording, .focus, .metric, .timeline, .recent {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(145deg, var(--surface-strong), var(--surface));
      backdrop-filter: blur(18px) saturate(125%);
      -webkit-backdrop-filter: blur(18px) saturate(125%);
    }
    .recording { display: flex; align-items: center; gap: 12px; min-width: 218px; padding: 13px 16px; }
    .recording-dot { width: 11px; height: 11px; border-radius: 50%; background: #68686f; box-shadow: 0 0 0 5px rgba(104,104,111,.12); }
    .is-recording .recording-dot { background: var(--orange); box-shadow: 0 0 0 5px rgba(255,138,31,.14), 0 0 18px rgba(255,138,31,.65); animation: record-pulse 1.8s ease-in-out infinite; }
    @keyframes record-pulse { 0%,100% { transform: scale(.92); opacity:.76; } 50% { transform: scale(1); opacity:1; } }
    .label { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: 0; text-transform: uppercase; }
    .value { margin-top: 3px; font-size: 20px; line-height: 1; font-weight: 750; letter-spacing: 0; }
    .focus { min-width: 176px; padding: 12px 16px; }
    .target { display: flex; align-items: center; gap: 8px; margin-left: auto; padding: 0 14px; color: #d1d1d5; font-size: 12px; }
    .target .status { width: 7px; height: 7px; border-radius: 50%; background: #6e6f75; }
    .target.available .status { background: var(--green); box-shadow: 0 0 12px rgba(89,216,139,.6); }
    .metrics { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .metric { display: grid; grid-template-columns: 31px 1fr; align-items: center; gap: 9px; min-height: 58px; padding: 9px 12px; }
    .icon { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 6px; background: rgba(255,255,255,.06); }
    .icon svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .metric:nth-child(1) .icon { color: var(--orange); background: rgba(255,138,31,.11); }
    .metric:nth-child(2) .icon { color: var(--blue); background: rgba(65,185,255,.11); }
    .metric:nth-child(3) .icon { color: var(--yellow); background: rgba(255,197,42,.11); }
    .metric:nth-child(4) .icon { color: var(--magenta); background: rgba(215,109,255,.11); }
    .metric:nth-child(5) .icon { color: var(--green); background: rgba(89,216,139,.11); }
    .metric .value { font-size: 17px; }
    .metric .label { font-size: 9px; }
    .detail-grid { display: grid; grid-template-columns: minmax(0, 2fr) minmax(260px, .8fr); gap: 10px; min-height: 160px; }
    .detail-grid.timeline-only { grid-template-columns: 1fr; }
    .detail-grid.recent-only { grid-template-columns: minmax(280px, 430px); justify-content: end; }
    .timeline, .recent { padding: 13px 15px; min-width: 0; }
    .panel-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 9px; }
    .panel-title { font-size: 13px; font-weight: 700; }
    .panel-meta { color: #82828a; font-size: 10px; }
    canvas { display: block; width: 100%; height: 106px; }
    .legend { display: flex; align-items: center; gap: 14px; margin-top: 4px; color: #a9a9b0; font-size: 9px; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i { width: 7px; height: 7px; border-radius: 2px; }
    .activity-list { display: grid; gap: 5px; max-height: 119px; overflow: hidden; }
    .activity { display: grid; grid-template-columns: 27px 1fr auto; align-items: center; gap: 8px; min-height: 27px; padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .activity:last-child { border-bottom: 0; }
    .activity .icon { width: 25px; height: 25px; border-radius: 5px; color: var(--activity-color); background: color-mix(in srgb, var(--activity-color) 12%, transparent); }
    .activity .icon svg { width: 14px; height: 14px; }
    .activity-name { font-size: 11px; font-weight: 650; }
    .activity-age { color: #85858d; font-size: 9px; }
    .empty { height: 93px; display: grid; place-items: center; color: #7e7e86; font-size: 11px; }
    [hidden] { display: none !important; }
    @media (max-width: 760px) {
      .target { display:none; }
      .metrics { grid-template-columns: repeat(5, 1fr); }
      .metric { grid-template-columns: 1fr; justify-items:center; text-align:center; padding: 8px 4px; }
      .metric .label { display:none; }
      .detail-grid { grid-template-columns: 1fr; }
      .recent { display:none; }
    }
  </style>
</head>
<body>
  <main class="overlay" id="overlay">
    <section class="topline" id="recordingSection">
      <div class="recording" id="recordingCard">
        <span class="recording-dot"></span>
        <div><div class="label" id="recordingState">Paused</div><div class="value" id="elapsed">00:00</div></div>
      </div>
      <div class="focus"><div class="label">Focus time</div><div class="value" id="focus">00:00</div></div>
      <div class="target" id="target"><span class="status"></span><span id="targetText">Waiting for drawing app</span></div>
    </section>

    <section class="metrics" id="metricsSection"></section>

    <section class="detail-grid" id="detailGrid">
      <div class="timeline" id="timelineSection">
        <div class="panel-head"><span class="panel-title">Live activity</span><span class="panel-meta">Last 30 minutes · local</span></div>
        <canvas id="timelineCanvas"></canvas>
        <div class="legend" id="legend"></div>
      </div>
      <div class="recent" id="recentSection">
        <div class="panel-head"><span class="panel-title">Recent activity</span><span class="panel-meta">Live</span></div>
        <div class="activity-list" id="activityList"></div>
      </div>
    </section>
  </main>
  <script>
    const icons = {
      keyboard: '<svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 10h.01M11 10h.01M15 10h.01M19 10h.01M8 14h8"/></svg>',
      text: '<svg viewBox="0 0 24 24"><path d="M5 7V5h14v2M9 19h6M12 5v14"/></svg>',
      click: '<svg viewBox="0 0 24 24"><path d="m4 4 7.1 17 2.4-7.5L21 11.1 4 4Z"/></svg>',
      drag: '<svg viewBox="0 0 24 24"><path d="M5 9V5h4M15 5h4v4M19 15v4h-4M9 19H5v-4M8 8l8 8"/></svg>',
      wheel: '<svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="5"/><path d="M12 6v4"/></svg>'
    };
    const meta = {
      keyboard: { label: 'Keyboard', color: '#ff8a1f' },
      text: { label: 'Text input', color: '#41b9ff' },
      click: { label: 'Click', color: '#ffc52a' },
      drag: { label: 'Drag', color: '#d76dff' },
      wheel: { label: 'Wheel', color: '#59d88b' }
    };
    const keys = Object.keys(meta);
    let state = null;

    function duration(seconds) {
      seconds = Math.max(0, Number(seconds) || 0);
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function renderMetrics(metrics) {
      document.getElementById('metricsSection').innerHTML = keys.map(key => `
        <div class="metric"><span class="icon">${icons[key]}</span><div><div class="label">${meta[key].label}</div><div class="value">${Number(metrics[key] || 0).toLocaleString()}</div></div></div>
      `).join('');
    }

    function renderTimeline(timeline) {
      const canvas = document.getElementById('timelineCanvas');
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      const width = rect.width;
      const height = rect.height;
      const graphBottom = height - 18;
      const graphTop = 7;
      const gap = 3;
      const count = Math.max(1, timeline.length);
      const barWidth = Math.max(3, (width - gap * (count - 1)) / count);
      const totals = timeline.map(bucket => keys.reduce((sum, key) => sum + Number(bucket[key] || 0), 0));
      const maximum = Math.max(1, ...totals);
      ctx.strokeStyle = 'rgba(255,255,255,.075)';
      ctx.lineWidth = 1;
      for (let line = 0; line < 3; line++) {
        const y = graphTop + (graphBottom - graphTop) * line / 2;
        ctx.beginPath(); ctx.moveTo(0, y + .5); ctx.lineTo(width, y + .5); ctx.stroke();
      }
      timeline.forEach((bucket, index) => {
        const x = index * (barWidth + gap);
        let y = graphBottom;
        keys.forEach(key => {
          const value = Number(bucket[key] || 0);
          if (!value) return;
          const segmentHeight = Math.max(2, (graphBottom - graphTop) * value / maximum);
          const gradient = ctx.createLinearGradient(x, y - segmentHeight, x + barWidth, y);
          gradient.addColorStop(0, meta[key].color + 'f2');
          gradient.addColorStop(1, meta[key].color + 'a8');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.roundRect(x, y - segmentHeight, barWidth, segmentHeight, Math.min(2.5, barWidth / 2));
          ctx.fill();
          y -= segmentHeight;
        });
        if (index === timeline.length - 1) {
          ctx.strokeStyle = 'rgba(255,154,50,.7)';
          ctx.strokeRect(x - 1, graphTop - 1, barWidth + 2, graphBottom - graphTop + 2);
        }
      });
      ctx.fillStyle = '#777880';
      ctx.font = '9px Inter, -apple-system, sans-serif';
      ctx.fillText('-30m', 0, height - 2);
      const now = 'Now';
      ctx.fillText(now, width - ctx.measureText(now).width, height - 2);
    }

    function renderRecent(recent) {
      const list = document.getElementById('activityList');
      if (!recent.length) {
        list.innerHTML = '<div class="empty">Activity appears here while you draw.</div>';
        return;
      }
      const now = Date.now();
      list.innerHTML = recent.slice(0, 5).map(event => {
        const kind = meta[event.kind] ? event.kind : 'keyboard';
        const age = Math.max(0, Math.floor((now - Number(event.at || now)) / 1000));
        const ageText = age < 60 ? `${age}s` : `${Math.floor(age / 60)}m`;
        return `<div class="activity" style="--activity-color:${meta[kind].color}"><span class="icon">${icons[kind]}</span><span class="activity-name">${meta[kind].label}</span><span class="activity-age">${ageText}</span></div>`;
      }).join('');
    }

    function render(next) {
      state = next;
      const visibility = next.visibility || {};
      document.getElementById('recordingSection').hidden = visibility.recording === false;
      document.getElementById('metricsSection').hidden = visibility.metrics === false;
      document.getElementById('timelineSection').hidden = visibility.timeline === false;
      document.getElementById('recentSection').hidden = visibility.recent === false;
      const detail = document.getElementById('detailGrid');
      detail.hidden = visibility.timeline === false && visibility.recent === false;
      detail.classList.toggle('timeline-only', visibility.timeline !== false && visibility.recent === false);
      detail.classList.toggle('recent-only', visibility.timeline === false && visibility.recent !== false);
      document.getElementById('recordingCard').classList.toggle('is-recording', Boolean(next.recording));
      document.getElementById('recordingState').textContent = next.recording ? 'Recording' : 'Paused';
      document.getElementById('elapsed').textContent = duration(next.elapsedSeconds);
      document.getElementById('focus').textContent = duration(next.focusSeconds);
      document.getElementById('target').classList.toggle('available', Boolean(next.targetAvailable));
      document.getElementById('targetText').textContent = next.targetAvailable ? 'Drawing app active' : 'Waiting for drawing app';
      renderMetrics(next.metrics || {});
      renderTimeline(next.timeline || []);
      renderRecent(next.recent || []);
    }

    async function refresh() {
      try {
        const response = await fetch('/state', { cache: 'no-store' });
        if (response.ok) render(await response.json());
      } catch (_) {}
    }
    window.addEventListener('resize', () => state && renderTimeline(state.timeline || []));
    refresh();
    setInterval(refresh, 250);
  </script>
</body>
</html>
